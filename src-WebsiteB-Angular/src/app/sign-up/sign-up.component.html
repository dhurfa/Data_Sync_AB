<div class="container">
    <div class="row">
        <div class="col-lg-6 col-md-6 mx-auto">
            <div class="card mt-4">
                <div class="card-header bg-secondary text-white">
                    <h3>Sign Up</h3>
                </div>
                <div class="card-body">
                    <form [formGroup]="signUpForm" (ngSubmit)="onSignUpClick()">
                        <div class="form-group form-row">
                            <label for="UserName" class="col-md-4 col-form-label">
                                 Username
                            </label>
                            <input id="UserName" class="form-control" formControlName="UserName" type="text" class="form-control" placeholder="UserName"
                            name="UserName" autofocus="autofocus">
                            <span id="UserNameError" class="col-md-12 text-danger" *ngIf="signUpForm.controls['UserName'].touched && signUpForm.hasError('required','UserName')">Username is required</span>
                        </div>

                        <div class="form-group form-row">
                            <label for="Password" class="col-md-4 col-form-label">
                                 Password
                            </label>
                            <input id="Password" class="form-control" formControlName="Password" type="password" class="form-control" placeholder="Password" 
                            name="Password" autofocus="autofocus">
                            <span id="PasswordError" class="col-md-12 text-danger" *ngIf="signUpForm.controls['Password'].touched && signUpForm.hasError('required','Password')">Password is required</span>
                            <span id="PasswordError" class="col-md-12 text-danger" *ngIf="signUpForm.controls['Password'].touched && signUpForm.hasError('minlength','Password')">Password must contain atleast 6 characters</span>
                        </div>
                

                        <div class="form-group text-right">
                            <span class="text-danger">{{signUpError}}&nbsp;</span>
                            <button class="btn btn-primary" routerLink="/login">Cancel</button>
                            <button id="signUpButton" class="btn btn-success" [disabled]="!signUpForm.valid">
                                Sign Up
                            </button>
                        </div>
                    </form>
                </div>
            
            </div>
        </div>
    </div>
</div>
